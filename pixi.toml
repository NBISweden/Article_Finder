[workspace]
authors = ["Zahra Khorasani <zahra.khorasani@nbis.se>"]
channels = ["conda-forge"]
name = "Article_Finder"
platforms = ["osx-arm64","osx-64","linux-64","win-64"]
version = "0.1.0"

[tasks]
ui      = "marimo run apps/article_finder_ui.py"
ui-edit = "marimo edit apps/article_finder_ui.py"

[dependencies]
python = ">=3.14.3,<3.15"
keyring = ">=25.7.0,<26"
rapidfuzz = ">=3.14.5,<4"
numpy = ">=2.4.3,<3"

[pypi-dependencies]
pandas = ">=3.0.1, <4"
requests = ">=2.32.5, <3"
python-dotenv = ">=1.2.2, <2"
pyyaml = ">=6.0.3, <7"
marimo = ">=0.21.0, <0.22"
ruff = ">=0.15.6, <0.16"
